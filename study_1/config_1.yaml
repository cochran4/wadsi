# Path to the raw dataset
data_file: "../../data/data_pce.csv"

# Predictors (factors of interest)
# These are the variables whose causal effects we estimate
predictors:
  - name: sbp                 # Systolic blood pressure (continuous)
    type: continuous
  - name: smoker_current      # Current smoking status (yes/no)
    type: categorical
  - name: hdl_c               # HDL cholesterol (continuous)
    type: continuous
  - name: tot_chol            # Total cholesterol (continuous)
    type: continuous
  - name: bp_treated          # Blood pressure medication use (yes/no)
    type: categorical
  - name: race                # Self-reported race
    type: categorical

# Covariates (adjustment variables)
# Included in all models to control for confounding
covariates:
  - name: age
    type: continuous
  - name: sex
    type: categorical

# Outcome variable
# Must be binary or continuous
outcome:
  name: diabetes
  type: categorical
  reference: 0

# Missingness indicators
# For each variable listed, create a binary indicator for missing values
missingness_indicators:
  - bp_treated

# -------------------------------------------------------------------------
# Population outcome probabilities
#   These define Pr(Y=1) and Pr(Y=0) in the target population.
#   They are used to construct likelihood ratio weights π(Z),
#   and may differ from the observed sample proportions.
# -------------------------------------------------------------------------
population_priors:
  pY1: 0.02   # Example: 2% cases in the target population
  pY0: 0.98   # Complement

# Display labels used in plots and tables
predictor_labels:
  sbp: "Systolic blood pressure, mmHg"
  smoker_current: "Current smoking"
  hdl_c: "HDL cholesterol, mg/dL"
  tot_chol: "Total cholesterol, mg/dL"
  bp_treated: "Blood pressure medication"
  race: "Race"
